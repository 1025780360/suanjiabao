apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: suanjiabao-postgres
spec:
  description: Persistent PostgreSQL database for suanjiabao.
  services:
    - name: suanjiabao-postgres
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:16-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_DB:
            default: suanjiabao
            expose: true
          POSTGRES_USER:
            default: postgres
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
          DATABASE_URL:
            default: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
            expose: true
            readonly: true
        instructions:
          - type: TEXT
            title: Internal database URL
            content: ${DATABASE_URL}
          - type: PASSWORD
            title: PostgreSQL password
            content: ${POSTGRES_PASSWORD}
